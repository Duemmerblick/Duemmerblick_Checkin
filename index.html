<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dümmerblick Manager v7.6</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        
        /* Login */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; color: white; flex-direction: column; }
        #pass-input { width: 280px; padding: 15px; border-radius: 10px; border: none; margin-bottom: 20px; text-align: center; font-size: 18px; color: #000; }
        .btn-login { background: var(--success); color: white; width: 280px; padding: 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }

        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .nav { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .nav button { flex: 1; min-width: 80px; padding: 15px 5px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 12px; cursor: pointer; }
        .btn-blue { background: var(--secondary); }
        .btn-green { background: var(--success); }
        .btn-orange { background: #e67e22; }
        .btn-gray { background: #95a5a6; }

        .hidden { display: none !important; }
        
        /* Status Badges */
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; white-space: nowrap; }
        .s-done { background: #d4edda; color: #155724; }
        .s-open { background: #fff3cd; color: #856404; }
        .btn-storno { background: var(--danger); color: white; padding: 6px 10px; border: none; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }

        /* Eingabefelder */
        .field-box { margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .field-label { background: #eee; padding: 6px 12px; font-size: 11px; font-weight: bold; color: #555; display: block; border-bottom: 1px solid #ddd; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: none; font-size: 16px; box-sizing: border-box; background: #fff; color: #000; }

        /* Listen-Ansicht Optimierung */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f8f9fa; padding: 10px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }

        #signature-pad { background: #fafafa; width: 100%; height: 200px; touch-action: none; border-top: 1px solid #ddd; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2 style="margin-bottom:20px;">Dümmerblick Login</h2>
    <input type="text" id="pass-input" placeholder="Passwort" autocorrect="off" autocapitalize="none">
    <button onclick="handleLogin()" class="btn-login">ANMELDEN</button>
</div>

<div id="loading-overlay">Daten werden geladen...</div>

<div class="container hidden" id="app-content">
    <div class="nav">
        <button class="btn-blue" onclick="showView('visual')">📊 30 Tage</button>
        <button class="btn-orange" onclick="showView('year')">🗓️ Jahr</button>
        <button class="btn-green" onclick="showView('list')">📋 Liste</button>
        <button class="btn-gray" onclick="showView('form')">➕ NEU</button>
    </div>

    <div id="view-visual" class="content-view">
        <div id="timeline" style="overflow-x:auto;"></div>
    </div>

    <div id="view-year" class="content-view hidden">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <select id="year-select" onchange="renderYear()"></select>
            <select id="apt-filter" onchange="renderYear()"><option>Dümmerblick 1</option><option>Dümmerblick 2</option></select>
        </div>
        <div id="year-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:10px;"></div>
    </div>

    <div id="view-kalender" class="content-view hidden">
        <table id="g-table">
            <thead><tr><th>Gast / Haus</th><th>Datum</th><th>Status</th><th>Aktion</th></tr></thead>
            <tbody id="belegungsDaten"></tbody>
        </table>
    </div>

    <div id="view-form" class="content-view hidden">
        <form id="checkinForm">
            <input type="hidden" id="f-id">
            <div class="field-box"><span class="field-label">WOHNUNG</span><select id="wohnung"><option>Dümmerblick 1</option><option>Dümmerblick 2</option></select></div>
            <div class="field-box"><span class="field-label">NAME</span><input type="text" id="gastName" required></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="field-box"><span class="field-label">ANREISE</span><input type="date" id="anreise" required></div>
                <div class="field-box"><span class="field-label">ABREISE</span><input type="date" id="abreise" required></div>
            </div>
            <div class="field-box"><span class="field-label">E-MAIL ADRESSE</span><input type="email" id="email"></div>
            <div class="field-box"><span class="field-label">TELEFONNUMMER</span><input type="tel" id="telefon"></div>
            <div class="field-box"><span class="field-label">AUSWEISNUMMER</span><input type="text" id="ausweis"></div>
            <div class="field-box"><span class="field-label">ANSCHRIFT</span><input type="text" id="anschrift"></div>
            <div class="field-box"><span class="field-label">UNTERSCHRIFT</span><canvas id="signature-pad"></canvas></div>
            <button type="submit" class="btn-green" style="width:100%; height:60px;">💾 SPEICHERN</button>
        </form>
    </div>
</div>

<script>
    const MY_PASSWORD = "duemmer123"; 
    const API_URL = "https://script.google.com/macros/s/AKfycbwmTGnzW0mS0HKMOZTQyTy68-VOlhNdJGjwU05pCg8tJ3ZVDA0cVZml1e-rDCrCF5R9/exec";
    
    let db = [];
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function handleLogin() {
        const val = document.getElementById('pass-input').value.toLowerCase().trim();
        if(val === MY_PASSWORD) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').classList.remove('hidden');
            load();
        } else { document.getElementById('pass-error').classList.remove('hidden'); }
    }

    function showView(v) {
        document.querySelectorAll('.content-view').forEach(el => el.classList.add('hidden'));
        if(v === 'visual') { document.getElementById('view-visual').classList.remove('hidden'); renderTimeline(); }
        if(v === 'year') { document.getElementById('view-year').classList.remove('hidden'); renderYear(); }
        if(v === 'list') { document.getElementById('view-kalender').classList.remove('hidden'); renderTable(); }
        if(v === 'form') { 
            document.getElementById('view-form').classList.remove('hidden'); 
            document.getElementById('checkinForm').reset();
            document.getElementById('f-id').value = Date.now();
            setTimeout(resizeCanvas, 150); 
        }
    }

    async function load() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const r = await fetch(API_URL + "?nocache=" + Date.now());
            db = await r.json();
            renderTimeline();
        } catch(e) { console.log(e); }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function renderTable() {
        const tbody = document.getElementById('belegungsDaten'); tbody.innerHTML = '';
        db.sort((a,b) => new Date(a.anreise) - new Date(b.anreise)).forEach(b => {
            const isDone = b.signature && b.signature.length > 500;
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td onclick="editEntry('${b.id}')"><b>${b.name || 'Booking'}</b><br><small>${b.wohnung}</small></td>
                <td onclick="editEntry('${b.id}')" style="font-size:11px;">${b.anreise}</td>
                <td onclick="editEntry('${b.id}')"><span class="status-badge ${isDone ? 's-done' : 's-open'}">${isDone ? 'CHECKED-IN' : 'OFFEN'}</span></td>
                <td><button class="btn-storno" onclick="storno('${b.id}')">Storno</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function storno(id) {
        if(confirm("Buchung wirklich stornieren?")) {
            document.getElementById('loading-overlay').style.display = 'flex';
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({id: id, delete: true}) });
            setTimeout(() => { load(); showView('list'); }, 2000);
        }
    }

    function renderTimeline() {
        const cont = document.getElementById('timeline'); cont.innerHTML = '';
        const today = new Date(); today.setHours(0,0,0,0);
        let h = '<div style="display:grid; grid-template-columns:140px repeat(31,45px); min-width:1530px; border-bottom:1px solid #ddd; background:#eee;"><div style="padding:10px;">Tag</div>';
        for(let i=0; i<=30; i++) {
            let d = new Date(today); d.setDate(today.getDate()+i);
            h += `<div style="text-align:center; padding:5px; font-size:10px;">${d.getDate()}.${d.getMonth()+1}</div>`;
        }
        h += '</div>';
        ["Dümmerblick 1", "Dümmerblick 2"].forEach(apt => {
            h += `<div style="display:grid; grid-template-columns:140px repeat(31,45px); min-width:1530px; height:50px; position:relative; border-bottom:1px solid #eee;"><div style="padding:15px 10px; font-weight:bold; background:#f9f9f9;">${apt}</div>`;
            db.filter(b => b.wohnung === apt).forEach(b => {
                let s = new Date(b.anreise); let e = new Date(b.abreise);
                let dS = Math.floor((s - today) / 86400000); let dur = Math.ceil((e - s) / 86400000);
                if(dS + dur >= 0 && dS <= 30) {
                    let st = Math.max(0, dS); let en = Math.min(31, dS + dur);
                    let w = (en - st) * 45;
                    if(w > 5) h += `<div onclick="editEntry('${b.id}')" style="position:absolute; left:${140+(st*45)}px; width:${w-4}px; height:30px; top:10px; background:${b.signature && b.signature.length > 500 ? '#27ae60':'#3498db'}; color:white; border-radius:5px; padding:5px; font-size:10px; z-index:10; overflow:hidden;">${b.name || 'Booking'}</div>`;
                }
            });
            h += '</div>';
        });
        cont.innerHTML = h;
    }

    function renderYear() {
        const year = parseInt(document.getElementById('year-select').value);
        const apt = document.getElementById('apt-filter').value;
        const cont = document.getElementById('year-container');
        let fullHtml = '';
        for (let m=0; m<12; m++) {
            let mName = new Date(year, m).toLocaleString('de-DE', {month:'long'});
            let html = `<div class="month-box"><div style="text-align:center;font-weight:bold;margin-bottom:5px;background:#2c3e50;color:white;padding:5px;border-radius:4px;">${mName}</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">`;
            let days = new Date(year, m+1, 0).getDate();
            for(let d=1; d<=days; d++) {
                let ds = `${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let b = db.find(x => x.wohnung === apt && ds >= x.anreise && ds < x.abreise);
                let cls = b ? (b.signature && b.signature.length > 500 ? 'background:#27ae60;color:white;' : 'background:#3498db;color:white;') : 'background:#f8f9fa;';
                html += `<div style="padding:5px 0;text-align:center;font-size:10px;border-radius:2px;border:1px solid #eee;${cls}">${d}</div>`;
            }
            fullHtml += html + `</div></div>`;
        }
        cont.innerHTML = fullHtml;
    }

    function editEntry(id) {
        const b = db.find(x => x.id == id);
        if(!b) return;
        document.getElementById('f-id').value = b.id;
        document.getElementById('wohnung').value = b.wohnung;
        document.getElementById('gastName').value = b.name || "Booking.com";
        document.getElementById('anreise').value = b.anreise;
        document.getElementById('abreise').value = b.abreise;
        document.getElementById('anschrift').value = b.anschrift || "";
        document.getElementById('email').value = b.email || "";
        document.getElementById('telefon').value = b.telefon || "";
        document.getElementById('ausweis').value = b.ausweis || "";
        showView('form');
        clearSig();
        if(b.signature && b.signature.length > 500) { let img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = b.signature; }
    }

    async function save(e) {
        e.preventDefault();
        const entry = { id: document.getElementById('f-id').value, wohnung: document.getElementById('wohnung').value, name: document.getElementById('gastName').value, anreise: document.getElementById('anreise').value, abreise: document.getElementById('abreise').value, anschrift: document.getElementById('anschrift').value, email: document.getElementById('email').value, telefon: document.getElementById('telefon').value, ausweis: document.getElementById('ausweis').value, signature: canvas.toDataURL() };
        document.getElementById('loading-overlay').style.display = 'flex';
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
        setTimeout(() => { load(); showView('list'); }, 2000);
    }
    document.getElementById('checkinForm').onsubmit = save;

    const curYear = new Date().getFullYear();
    const ySel = document.getElementById('year-select');
    for(let y=curYear-1; y<=curYear+2; y++) {
        let o = document.createElement('option'); o.value=y; o.innerText=y; if(y===curYear) o.selected=true; ySel.appendChild(o);
    }

    function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; ctx.lineWidth = 3; ctx.lineCap = "round"; }
    const getPos = (e) => { const r = canvas.getBoundingClientRect(); const cX = e.touches ? e.touches[0].clientX : e.clientX; const cY = e.touches ? e.touches[0].clientY : e.clientY; return { x: cX - r.left, y: cY - r.top }; };
    canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); });
    window.addEventListener('touchend', () => drawing = false);
    function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
</script>
</body>
</html>
