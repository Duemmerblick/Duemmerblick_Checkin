<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dümmerblick Manager v6.7</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        
        /* Login Fix */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--primary); display: flex; justify-content: center; 
            align-items: center; z-index: 9999; color: white; flex-direction: column; 
        }
        .login-box { width: 85%; max-width: 300px; text-align: center; }
        #pass-input { 
            width: 100%; padding: 15px; border-radius: 10px; border: none; 
            margin-bottom: 15px; text-align: center; font-size: 18px; box-sizing: border-box;
            background: white; color: #333; display: block;
        }
        .btn-login { 
            background: var(--success); color: white; width: 100%; padding: 18px; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px;
        }

        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .nav { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        
        /* Mobile-Safe Buttons */
        .nav button { 
            flex: 1; min-width: 120px; padding: 15px; border: none; border-radius: 8px; 
            font-weight: bold; color: white; cursor: pointer; font-size: 14px;
            touch-action: manipulation;
        }
        .btn-blue { background: var(--secondary); }
        .btn-green { background: var(--success); }
        .btn-orange { background: #e67e22; }
        .btn-gray { background: #95a5a6; }
        .btn-red { background: var(--danger); padding: 8px; font-size: 11px; flex: none !important; min-width: auto !important; }

        .hidden { display: none !important; }
        
        /* Table & Lists */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
        .s-done { background: #d4edda; color: #155724; }
        .s-open { background: #fff3cd; color: #856404; }

        /* Timeline */
        .timeline-container { overflow-x: auto; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; -webkit-overflow-scrolling: touch; }
        .timeline-grid { display: grid; grid-template-columns: 140px repeat(31, 45px); min-width: 1530px; position: relative; border-bottom: 1px solid #eee; }
        .apt-label { padding: 15px 10px; font-weight: bold; background: #f1f1f1; border-right: 2px solid #ddd; }
        .day-cell { text-align: center; padding: 8px 0; font-size: 10px; border-right: 1px solid #eee; background: #fff; }
        .booking-bar { height: 30px; margin: 10px 0; border-radius: 5px; background: var(--secondary); color: white; font-size: 10px; padding: 0 5px; position: absolute; z-index: 5; display: flex; align-items: center; white-space: nowrap; overflow: hidden; }
        .booking-bar.done { background: var(--success); }

        input, select { width: 100%; padding: 12px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        #signature-pad { border: 2px dashed #ccc; background: #fafafa; width: 100%; height: 200px; touch-action: none; border-radius: 8px; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>Dümmerblick</h2>
        <input type="password" id="pass-input" placeholder="Passwort" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button id="login-btn" class="btn-login">ANMELDEN</button>
        <p id="pass-error" style="color: #ff7675; margin-top: 15px; font-size: 14px;" class="hidden">Falsches Passwort!</p>
    </div>
</div>

<div id="loading-overlay">Daten-Abgleich...</div>

<div class="container hidden" id="app-content">
    <div class="nav">
        <button class="btn-blue" id="nav-visual">📊 30 Tage</button>
        <button class="btn-orange" id="nav-year">🗓️ Jahr</button>
        <button class="btn-green" id="nav-list">📋 Gästeliste</button>
        <button class="btn-gray" id="nav-new">➕ NEU</button>
    </div>

    <div id="view-visual" class="content-view">
        <h3>Belegung (30 Tage)</h3>
        <div class="timeline-container" id="timeline"></div>
    </div>

    <div id="view-kalender" class="content-view hidden">
        <h3>Gästeliste</h3>
        <table>
            <thead><tr><th>Gast</th><th>Haus</th><th>Anreise</th><th>Status</th><th>Aktion</th></tr></thead>
            <tbody id="belegungsDaten"></tbody>
        </table>
    </div>

    <div id="view-year" class="content-view hidden">
        <h3>Jahres-Plan</h3>
        <div id="year-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:10px;"></div>
    </div>

    <div id="view-form" class="content-view hidden">
        <h2>Check-In</h2>
        <form id="checkinForm">
            <input type="hidden" id="f-id">
            <label>Wohnung</label><select id="wohnung"><option>Dümmerblick 1</option><option>Dümmerblick 2</option></select>
            <label>Gast Name</label><input type="text" id="gastName" required>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Anreise</label><input type="date" id="anreise" required></div>
                <div><label>Abreise</label><input type="date" id="abreise" required></div>
            </div>
            <label>Anschrift</label><input type="text" id="anschrift">
            <label>Unterschrift</label><canvas id="signature-pad"></canvas>
            <button type="submit" class="btn-green" style="width:100%; height:60px; margin-top:20px;">💾 SPEICHERN</button>
        </form>
    </div>
</div>

<script>
    const MY_PASSWORD = "Duemmer123";
    const API_URL = "https://script.google.com/macros/s/AKfycbwmTGnzW0mS0HKMOZTQyTy68-VOlhNdJGjwU05pCg8tJ3ZVDA0cVZml1e-rDCrCF5R9/exec";
    
    let db = [];
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // NAVIGATION LOGIK (Mobile-Safe)
    function showView(vName) {
        document.querySelectorAll('.content-view').forEach(el => el.classList.add('hidden'));
        const target = {
            'visual': 'view-visual',
            'list': 'view-kalender',
            'year': 'view-year',
            'form': 'view-form'
        }[vName];
        document.getElementById(target).classList.remove('hidden');
        if(vName === 'visual') renderTimeline();
        if(vName === 'form') setTimeout(resizeCanvas, 150);
    }

    // Button Listener mit Touch-Support
    const bindBtn = (id, action) => {
        const el = document.getElementById(id);
        const handle = (e) => { e.preventDefault(); action(); };
        el.addEventListener('click', handle);
        el.addEventListener('touchend', handle);
    };

    bindBtn('nav-visual', () => showView('visual'));
    bindBtn('nav-list', () => showView('list'));
    bindBtn('nav-year', () => showView('year'));
    bindBtn('nav-new', () => {
        document.getElementById('checkinForm').reset();
        document.getElementById('f-id').value = Date.now();
        showView('form');
        clearSig();
    });

    // LOGIN
    const handleLogin = () => {
        if(document.getElementById('pass-input').value.trim() === MY_PASSWORD) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').classList.remove('hidden');
            loadFromCloud();
        } else {
            document.getElementById('pass-error').classList.remove('hidden');
        }
    };
    bindBtn('login-btn', handleLogin);

    async function loadFromCloud() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const resp = await fetch(API_URL + "?nocache=" + Date.now());
            db = await resp.json();
            renderTable();
            renderTimeline();
        } catch (e) { console.error(e); }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function renderTable() {
        const tbody = document.getElementById('belegungsDaten'); tbody.innerHTML = '';
        db.sort((a,b) => new Date(a.anreise) - new Date(b.anreise)).forEach(b => {
            const isDone = b.anschrift && b.signature && b.signature.length > 500;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><strong>${b.name || 'Booking.com'}</strong></td><td>${b.wohnung}</td><td>${b.anreise}</td><td><span class="status-badge ${isDone ? 's-done' : 's-open'}">${isDone ? 'EINGECHECKT' : 'OFFEN'}</span></td><td></td>`;
            
            // Storno Button
            const sBtn = document.createElement('button'); sBtn.className = 'btn-red'; sBtn.innerText = 'Storno';
            sBtn.onclick = (e) => { e.stopPropagation(); storno(b.id); };
            tr.lastElementChild.appendChild(sBtn);
            
            tr.onclick = () => editEntry(b.id);
            tbody.appendChild(tr);
        });
    }

    async function storno(id) {
        if(confirm("Stornieren?")) {
            document.getElementById('loading-overlay').style.display = 'flex';
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({id: id, delete: true}) });
            setTimeout(loadFromCloud, 2000);
        }
    }

    function renderTimeline() {
        const cont = document.getElementById('timeline'); if(!cont) return;
        cont.innerHTML = '';
        const today = new Date(); today.setHours(0,0,0,0);
        let h = '<div class="timeline-grid"><div class="apt-label">Datum</div>';
        for(let i=0; i<=30; i++) {
            let d = new Date(today); d.setDate(today.getDate()+i);
            h += `<div class="day-cell"><b>${d.getDate()}</b>.<br>${d.getMonth()+1}.</div>`;
        }
        h += '</div>';
        ["Dümmerblick 1", "Dümmerblick 2"].forEach(apt => {
            h += `<div class="timeline-grid" style="height:55px;"><div class="apt-label">${apt}</div>`;
            for(let i=0; i<=30; i++) h += `<div class="day-cell"></div>`;
            db.filter(b => b.wohnung === apt).forEach(b => {
                let s = new Date(b.anreise); let e = new Date(b.abreise);
                let dS = Math.floor((s - today) / 86400000); let dur = Math.ceil((e - s) / 86400000);
                if(dS + dur >= 0 && dS <= 30) {
                    let st = Math.max(0, dS); let en = Math.min(31, dS + dur);
                    let w = (en - st) * 45;
                    if(w > 5) h += `<div class="booking-bar ${b.signature && b.signature.length > 500 ? 'done' : ''}" style="left:${140+(st*45)}px; width:${w-4}px; top:12px;" onclick="editEntry('${b.id}')">${b.name || 'Booking.com'}</div>`;
                }
            });
            h += '</div>';
        });
        cont.innerHTML = h;
    }

    function editEntry(id) {
        const b = db.find(x => x.id == id);
        if(!b) return;
        document.getElementById('f-id').value = b.id;
        document.getElementById('wohnung').value = b.wohnung;
        document.getElementById('gastName').value = b.name || "Booking.com";
        document.getElementById('anreise').value = b.anreise;
        document.getElementById('abreise').value = b.abreise;
        document.getElementById('anschrift').value = b.anschrift || "";
        showView('form');
        clearSig();
        if(b.signature && b.signature.length > 500) { let img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = b.signature; }
    }

    async function saveToCloud(entry) {
        document.getElementById('loading-overlay').style.display = 'flex';
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
        setTimeout(loadFromCloud, 2500);
        showView('list');
    }

    function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.strokeStyle = "#000"; }
    function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    
    // Unterschrift Fix für Mobile
    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - r.left, y: clientY - r.top };
    };
    const start = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); if(e.touches) e.preventDefault(); };
    const move = (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.touches) e.preventDefault(); };
    canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start);
    canvas.addEventListener('mousemove', move); canvas.addEventListener('touchmove', move);
    window.addEventListener('mouseup', () => drawing = false); window.addEventListener('touchend', () => drawing = false);

    document.getElementById('checkinForm').onsubmit = (e) => {
        e.preventDefault();
        const entry = { id: document.getElementById('f-id').value, wohnung: document.getElementById('wohnung').value, name: document.getElementById('gastName').value || "Booking.com", anreise: document.getElementById('anreise').value, abreise: document.getElementById('abreise').value, anschrift: document.getElementById('anschrift').value, signature: canvas.toDataURL() };
        saveToCloud(entry);
    };
</script>
</body>
</html>
