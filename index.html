<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dümmerblick Manager v10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .timeline-grid { display: grid; grid-template-columns: 120px repeat(30, 80px); }
        .hidden { display: none; }
        canvas { border: 1px solid #ccc; width: 100%; height: 200px; touch-action: none; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <h1 class="font-bold text-lg">Dümmerblick Manager</h1>
        <button onclick="fetchData()" class="bg-blue-500 p-2 rounded"><i class="fas fa-sync"></i></button>
    </header>

    <div id="view-visual" class="content-view p-2 overflow-x-auto">
        <div id="timeline-container" class="bg-white rounded shadow p-2"></div>
    </div>

    <div id="view-year" class="content-view hidden p-2">
        <div id="year-container" class="space-y-4"></div>
    </div>

    <div id="view-kalender" class="content-view hidden p-2">
        <div id="list-container" class="space-y-2"></div>
    </div>

    <div id="view-form" class="content-view hidden p-4">
        <div class="bg-white p-4 rounded shadow-lg">
            <h2 class="text-xl font-bold mb-4">Check-In / Bearbeiten</h2>
            <form id="checkinForm" class="space-y-3">
                <input type="hidden" id="f-id">
                <div><label class="block text-sm">Gast-Name</label><input type="text" id="f-name" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm">Wohnung</label>
                    <select id="f-wohnung" class="w-full border p-2 rounded">
                        <option>Dümmerblick 1</option>
                        <option>Dümmerblick 2</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-sm">Anreise</label><input type="date" id="f-anreise" class="w-full border p-2 rounded"></div>
                    <div><label class="block text-sm">Abreise</label><input type="date" id="f-abreise" class="w-full border p-2 rounded"></div>
                </div>
                <div><label class="block text-sm">Anschrift</label><textarea id="f-anschrift" class="w-full border p-2 rounded"></textarea></div>
                <div><label class="block text-sm">Telefon</label><input type="text" id="f-telefon" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm">E-Mail</label><input type="text" id="f-email" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm">Ausweis-Nr.</label><input type="text" id="f-ausweis" class="w-full border p-2 rounded"></div>
                
                <div>
                    <label class="block text-sm font-bold">Unterschrift Gast</label>
                    <canvas id="sig-canvas"></canvas>
                    <button type="button" onclick="clearSig()" class="text-xs text-red-500 mt-1">Löschen</button>
                    <input type="hidden" id="f-signature">
                </div>

                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="saveData()" class="flex-1 bg-green-600 text-white p-3 rounded font-bold">Speichern</button>
                    <button type="button" onclick="showView('list')" class="flex-1 bg-gray-400 text-white p-3 rounded">Abbrechen</button>
                </div>
                <button type="button" onclick="deleteEntry()" class="w-full text-red-500 text-sm mt-4">Buchung löschen</button>
            </form>
        </div>
    </div>

    <div id="view-note" class="content-view hidden p-4">
        <div class="bg-white p-4 rounded shadow-lg">
            <h2 class="text-xl font-bold mb-4"><i class="fas fa-sticky-note mr-2"></i>Neue Notiz / Mangel</h2>
            <form id="noteForm" class="space-y-4">
                <div>
                    <label class="block text-sm">Betroffene Wohnung</label>
                    <select id="n-wohnung" class="w-full border p-3 rounded text-lg">
                        <option>Dümmerblick 1</option>
                        <option>Dümmerblick 2</option>
                        <option>Allgemein / Außen</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm">Was ist zu tun?</label>
                    <textarea id="n-text" rows="5" class="w-full border p-3 rounded text-lg" placeholder="z.B. Glühbirne Bad defekt, WLAN Router hakt..."></textarea>
                </div>
                <button type="button" onclick="saveNote()" class="w-full bg-orange-500 text-white p-4 rounded-xl font-bold text-lg shadow-lg">
                    Notiz in Tabelle speichern
                </button>
                <button type="button" onclick="showView('visual')" class="w-full text-gray-500 p-2">Abbrechen</button>
            </form>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-2 shadow-inner z-50">
        <button onclick="showView('visual')" class="flex flex-col items-center text-blue-600"><i class="fas fa-calendar-day text-xl"></i><span class="text-xs">30 Tage</span></button>
        <button onclick="showView('year')" class="flex flex-col items-center text-gray-500"><i class="fas fa-calendar-alt text-xl"></i><span class="text-xs">Jahr</span></button>
        <button onclick="showView('list')" class="flex flex-col items-center text-gray-500"><i class="fas fa-list text-xl"></i><span class="text-xs">Liste</span></button>
        <button onclick="showView('note')" class="flex flex-col items-center text-orange-500"><i class="fas fa-plus-circle text-2xl"></i><span class="text-xs">Notiz</span></button>
    </nav>

    <script>
        const WEB_APP_URL = "HIER_DEINE_URL_EINTRAGEN"; // <--- DEINE URL
        let G_DATA = [];

        async function fetchData() {
            const resp = await fetch(WEB_APP_URL);
            G_DATA = await resp.json();
            renderTimeline();
            renderYear();
            renderTable();
        }

        function showView(v) {
            document.querySelectorAll('.content-view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.replace('text-blue-600', 'text-gray-500'));
            
            if(v === 'form') {
                document.getElementById('view-form').classList.remove('hidden');
                setTimeout(resizeCanvas, 150);
            } else if(v === 'note') {
                document.getElementById('noteForm').reset();
                document.getElementById('view-note').classList.remove('hidden');
            } else {
                document.getElementById('view-' + v).classList.remove('hidden');
            }
        }

        async function saveNote() {
            const wohnung = document.getElementById('n-wohnung').value;
            const text = document.getElementById('n-text').value;
            if(!text) return alert("Bitte Text eingeben");

            const btn = event.target;
            btn.disabled = true; btn.innerText = "Speichert...";

            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ type: "note", wohnung, text })
            });

            alert("Notiz wurde im Tabellenblatt 'Notizen' gespeichert!");
            showView('visual');
            btn.disabled = false; btn.innerText = "Notiz in Tabelle speichern";
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            const today = new Date();
            let html = '<div class="timeline-grid font-bold border-b pb-2"><div>Einheit</div>';
            
            for(let i=0; i<30; i++) {
                let d = new Date(); d.setDate(today.getDate() + i);
                let isWeekend = d.getDay() === 0 || d.getDay() === 6;
                html += `<div class="text-center ${isWeekend ? 'bg-gray-100' : ''}">${d.getDate()}.${d.getMonth()+1}</div>`;
            }
            html += '</div>';

            ["Dümmerblick 1", "Dümmerblick 2"].forEach(room => {
                html += `<div class="timeline-grid border-b py-4"><div class="font-bold">${room}</div>`;
                for(let i=0; i<30; i++) {
                    let d = new Date(); d.setDate(today.getDate() + i);
                    d.setHours(0,0,0,0);
                    let booking = G_DATA.find(b => b.wohnung === room && new Date(b.anreise) <= d && new Date(b.abreise) > d);
                    
                    if(booking) {
                        const isStart = new Date(booking.anreise).getTime() === d.getTime();
                        html += `<div onclick="editEntry('${booking.id}')" class="h-8 bg-blue-500 text-white text-[10px] truncate p-1 cursor-pointer ${isStart ? 'rounded-l-lg' : ''}">${isStart ? booking.name : ''}</div>`;
                    } else {
                        html += `<div class="h-8 bg-gray-50 border-r"></div>`;
                    }
                }
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function renderTable() {
            const container = document.getElementById('list-container');
            const sorted = [...G_DATA].sort((a,b) => new Date(a.anreise) - new Date(b.anreise));
            container.innerHTML = sorted.map(b => `
                <div onclick="editEntry('${b.id}')" class="bg-white p-3 rounded shadow flex justify-between items-center border-l-4 ${b.wohnung.includes('2') ? 'border-orange-400' : 'border-blue-400'}">
                    <div>
                        <div class="font-bold">${b.name}</div>
                        <div class="text-xs text-gray-500">${new Date(b.anreise).toLocaleDateString()} - ${new Date(b.abreise).toLocaleDateString()}</div>
                    </div>
                    <div class="text-xs font-mono bg-gray-100 p-1 rounded">${b.wohnung}</div>
                </div>
            `).join('');
        }

        function renderYear() {
            const container = document.getElementById('year-container');
            container.innerHTML = '';
            for(let m=0; m<12; m++) {
                let d = new Date(new Date().getFullYear(), m, 1);
                let html = `<div class="bg-white p-2 rounded shadow"><h3 class="font-bold border-b mb-2">${d.toLocaleString('de-de', {month:'long'})}</h3><div class="grid grid-cols-7 gap-1">`;
                while(d.getMonth() === m) {
                    let dateStr = d.toISOString().split('T')[0];
                    let b1 = G_DATA.find(b => b.wohnung === "Dümmerblick 1" && b.anreise <= dateStr && b.abreise > dateStr);
                    let b2 = G_DATA.find(b => b.wohnung === "Dümmerblick 2" && b.anreise <= dateStr && b.abreise > dateStr);
                    let color = 'bg-gray-50';
                    if(b1 && b2) color = 'bg-purple-500 text-white';
                    else if(b1) color = 'bg-blue-400 text-white';
                    else if(b2) color = 'bg-orange-400 text-white';
                    html += `<div class="text-[10px] p-1 text-center ${color} rounded">${d.getDate()}</div>`;
                    d.setDate(d.getDate() + 1);
                }
                container.innerHTML += html + '</div></div>';
            }
        }

        function editEntry(id) {
            const b = G_DATA.find(x => x.id === id);
            if(!b) return;
            document.getElementById('f-id').value = b.id;
            document.getElementById('f-name').value = b.name;
            document.getElementById('f-wohnung').value = b.wohnung;
            document.getElementById('f-anreise').value = b.anreise;
            document.getElementById('f-abreise').value = b.abreise;
            document.getElementById('f-anschrift').value = b.anschrift || "";
            document.getElementById('f-telefon').value = b.telefon || "";
            document.getElementById('f-email').value = b.email || "";
            document.getElementById('f-ausweis').value = b.ausweis || "";
            document.getElementById('f-signature').value = b.signature || "";
            
            const canvas = document.getElementById('sig-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if(b.signature) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = b.signature;
            }
            showView('form');
        }

        async function saveData() {
            const data = {
                id: document.getElementById('f-id').value,
                name: document.getElementById('f-name').value,
                wohnung: document.getElementById('f-wohnung').value,
                anreise: document.getElementById('f-anreise').value,
                abreise: document.getElementById('f-abreise').value,
                anschrift: document.getElementById('f-anschrift').value,
                telefon: document.getElementById('f-telefon').value,
                email: document.getElementById('f-email').value,
                ausweis: document.getElementById('f-ausweis').value,
                signature: document.getElementById('sig-canvas').toDataURL()
            };
            await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(data) });
            fetchData();
            showView('visual');
        }

        async function deleteEntry() {
            if(!confirm("Buchung wirklich löschen?")) return;
            await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ id: document.getElementById('f-id').value, delete: true }) });
            fetchData();
            showView('visual');
        }

        // Signature Logic
        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
        }

        canvas.addEventListener('touchstart', (e) => { drawing = true; const t = e.touches[0]; ctx.beginPath(); ctx.moveTo(t.pageX - canvas.offsetLeft, t.pageY - canvas.offsetTop); e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { if(!drawing) return; const t = e.touches[0]; ctx.lineTo(t.pageX - canvas.offsetLeft, t.pageY - canvas.offsetTop); ctx.stroke(); e.preventDefault(); });
        canvas.addEventListener('touchend', () => drawing = false);
        function clearSig() { ctx.clearRect(0,0,canvas.width,canvas.height); }

        window.onload = fetchData;
    </script>
</body>
</html>
