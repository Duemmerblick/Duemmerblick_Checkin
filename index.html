<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dümmerblick Manager v10.1</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --orange: #e67e22; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        
        /* Login */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; color: white; flex-direction: column; }
        #pass-input { width: 280px; padding: 15px; border-radius: 10px; border: none; margin-bottom: 20px; text-align: center; font-size: 18px; color: #000; }
        .btn-login { background: var(--success); color: white; width: 280px; padding: 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding-bottom: 80px; }
        .nav-top { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .nav-top button { flex: 1; min-width: 80px; padding: 15px 5px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 12px; cursor: pointer; }
        
        .btn-blue { background: var(--secondary); }
        .btn-green { background: var(--success); }
        .btn-orange { background: var(--orange); }
        .btn-gray { background: #95a5a6; }
        
        .hidden { display: none !important; }
        
        /* Formulare */
        .field-box { margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fff; }
        .field-label { background: #eee; padding: 6px 12px; font-size: 11px; font-weight: bold; color: #555; display: block; border-bottom: 1px solid #ddd; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: none; font-size: 16px; box-sizing: border-box; background: #fff; color: #000; }
        
        canvas { background: #fafafa; width: 100%; height: 200px; touch-action: none; border-top: 1px solid #ddd; }
        
        /* Tabelle & Timeline */
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 8px; border-bottom: 1px solid #eee; font-size: 14px; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
        .s-done { background: #d4edda; color: #155724; }
        .s-open { background: #fff3cd; color: #856404; }

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2 style="margin-bottom:20px;">Dümmerblick Manager</h2>
    <input type="text" id="pass-input" placeholder="Passwort" autocorrect="off" autocapitalize="none">
    <button onclick="handleLogin()" class="btn-login">ANMELDEN</button>
</div>

<div id="loading-overlay">Daten werden geladen...</div>

<div class="container hidden" id="app-content">
    <div class="nav-top">
        <button class="btn-blue" onclick="showView('visual')">📊 30 Tage</button>
        <button class="btn-orange" onclick="showView('year')">🗓️ Jahr</button>
        <button class="btn-green" onclick="showView('list')">📋 Liste</button>
        <button class="btn-gray" onclick="showView('note')">📝 NOTIZ</button>
    </div>

    <div id="view-visual" class="content-view">
        <div id="timeline" style="overflow-x:auto;"></div>
    </div>

    <div id="view-year" class="content-view hidden">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <select id="year-select" onchange="renderYear()"></select>
            <select id="apt-filter" onchange="renderYear()"><option>Dümmerblick 1</option><option>Dümmerblick 2</option></select>
        </div>
        <div id="year-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:10px;"></div>
    </div>

    <div id="view-kalender" class="content-view hidden">
        <table>
            <thead><tr style="text-align:left; font-size:12px;"><th>Gast / Haus</th><th>Datum</th><th>Status</th></tr></thead>
            <tbody id="belegungsDaten"></tbody>
        </table>
    </div>

    <div id="view-note" class="content-view hidden">
        <h3 style="margin-top:0;">Neue Notiz / Mangel</h3>
        <div class="field-box"><span class="field-label">Wohnung</span>
            <select id="n-wohnung"><option>Dümmerblick 1</option><option>Dümmerblick 2</option><option>Allgemein</option></select>
        </div>
        <div class="field-box"><span class="field-label">Beschreibung</span>
            <textarea id="n-text" rows="5" placeholder="Was ist zu tun?"></textarea>
        </div>
        <button onclick="saveNote()" class="btn-orange" style="width:100%; padding:20px; border-radius:10px; color:white; font-weight:bold; border:none; font-size:16px;">NOTIZ SPEICHERN</button>
    </div>

    <div id="view-form" class="content-view hidden">
        <form id="checkinForm">
            <input type="hidden" id="f-id">
            <div class="field-box"><span class="field-label">Gast Name</span><input type="text" id="gastName" required></div>
            <div class="field-box"><span class="field-label">Wohnung</span><select id="wohnung"><option>Dümmerblick 1</option><option>Dümmerblick 2</option></select></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="field-box"><span class="field-label">Anreise</span><input type="date" id="anreise"></div>
                <div class="field-box"><span class="field-label">Abreise</span><input type="date" id="abreise"></div>
            </div>
            <div class="field-box"><span class="field-label">Anschrift</span><input type="text" id="anschrift"></div>
            <div class="field-box"><span class="field-label">Unterschrift</span><canvas id="signature-pad"></canvas></div>
            <button type="submit" class="btn-green" style="width:100%; height:60px; font-size:18px; color:white; border:none; border-radius:10px; font-weight:bold;">💾 SPEICHERN</button>
        </form>
    </div>
</div>

<script>
    const MY_PASSWORD = "duemmer123"; 
    const API_URL = "https://script.google.com/macros/s/AKfycbxcvq21Vjdcl2SJ3bJ4yWqQq74W7HagOoi1apaiwbIZv_F_O-1sReZPGyLeYyk1vWQ/exec"; 
    
    let db = [];
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function handleLogin() {
        if(document.getElementById('pass-input').value.toLowerCase().trim() === MY_PASSWORD) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').classList.remove('hidden');
            load();
        }
    }

    function showView(v) {
        document.querySelectorAll('.content-view').forEach(el => el.classList.add('hidden'));
        document.getElementById('view-' + (v === 'list' ? 'kalender' : v)).classList.remove('hidden');
        if(v === 'visual') renderTimeline();
        if(v === 'form') setTimeout(resizeCanvas, 150);
    }

    async function load() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const r = await fetch(API_URL + "?nocache=" + Date.now());
            db = await r.json();
            renderTimeline(); renderTable(); renderYear();
        } catch(e) { console.error(e); }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function renderTable() {
        const tbody = document.getElementById('belegungsDaten'); tbody.innerHTML = '';
        db.sort((a,b) => new Date(a.anreise) - new Date(b.anreise)).forEach(b => {
            const isDone = b.signature && b.signature.length > 500;
            let tr = document.createElement('tr');
            tr.onclick = () => editEntry(b.id);
            tr.innerHTML = `<td><b>${b.name}</b><br><small>${b.wohnung}</small></td><td>${b.anreise}</td><td><span class="status-badge ${isDone ? 's-done' : 's-open'}">${isDone ? 'OK' : 'OFFEN'}</span></td>`;
            tbody.appendChild(tr);
        });
    }

    function editEntry(id) {
        const b = db.find(x => x.id == id);
        if(!b) return;
        document.getElementById('f-id').value = b.id;
        document.getElementById('gastName').value = b.name;
        document.getElementById('wohnung').value = b.wohnung;
        document.getElementById('anreise').value = b.anreise;
        document.getElementById('abreise').value = b.abreise;
        document.getElementById('anschrift').value = b.anschrift || "";
        showView('form');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(b.signature) { let img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = b.signature; }
    }

    async function saveNote() {
        const text = document.getElementById('n-text').value;
        if(!text) return alert("Bitte Text eingeben");
        document.getElementById('loading-overlay').style.display = 'flex';
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({type: "note", wohnung: document.getElementById('n-wohnung').value, text: text}) });
        alert("Notiz gespeichert!");
        document.getElementById('n-text').value = "";
        showView('visual');
        document.getElementById('loading-overlay').style.display = 'none';
    }

    document.getElementById('checkinForm').onsubmit = async (e) => {
        e.preventDefault();
        const entry = { id: document.getElementById('f-id').value, name: document.getElementById('gastName').value, wohnung: document.getElementById('wohnung').value, anreise: document.getElementById('anreise').value, abreise: document.getElementById('abreise').value, anschrift: document.getElementById('anschrift').value, signature: canvas.toDataURL() };
        document.getElementById('loading-overlay').style.display = 'flex';
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
        setTimeout(() => { load(); showView('visual'); }, 1500);
    };

    // --- TIMELINE & YEAR LOGIC (v8.2 Standard) ---
    function renderTimeline() {
        const cont = document.getElementById('timeline'); cont.innerHTML = '';
        const today = new Date(); today.setHours(0,0,0,0);
        const dayWidth = 45; const navWidth = 120;
        let h = `<div style="display:grid; grid-template-columns:${navWidth}px repeat(31,${dayWidth}px); background:#eee; font-weight:bold;"><div style="padding:10px;">Einheit</div>`;
        for(let i=0; i<=30; i++) { let d = new Date(today); d.setDate(today.getDate()+i); h += `<div style="text-align:center; padding:5px; font-size:10px;">${d.getDate()}.${d.getMonth()+1}</div>`; }
        h += '</div>';
        ["Dümmerblick 1", "Dümmerblick 2"].forEach(apt => {
            h += `<div style="display:grid; grid-template-columns:${navWidth}px repeat(31,${dayWidth}px); position:relative; border-bottom:1px solid #eee; height:50px;"><div style="padding:15px 10px; background:#f9f9f9; font-weight:bold;">${apt}</div>`;
            db.filter(b => b.wohnung === apt).forEach(b => {
                let s = new Date(b.anreise); let e = new Date(b.abreise);
                let startDay = Math.floor((s - today) / 86400000);
                let duration = Math.ceil((e - s) / 86400000);
                if(startDay + duration >= 0 && startDay <= 30) {
                    let left = navWidth + (startDay * dayWidth) + (dayWidth/2);
                    let width = (duration * dayWidth);
                    h += `<div onclick="editEntry('${b.id}')" style="position:absolute; left:${left}px; width:${width-4}px; height:30px; top:10px; background:${b.signature ? '#27ae60':'#3498db'}; color:white; border-radius:6px; font-size:9px; text-align:center; line-height:30px; cursor:pointer; overflow:hidden;">${b.name}</div>`;
                }
            });
            h += '</div>';
        });
        cont.innerHTML = h;
    }

    function renderYear() {
        const year = parseInt(document.getElementById('year-select').value);
        const apt = document.getElementById('apt-filter').value;
        const cont = document.getElementById('year-container'); cont.innerHTML = '';
        for(let m=0; m<12; m++) {
            let mName = new Date(year, m).toLocaleString('de-DE', {month:'long'});
            let html = `<div style="background:#fff; padding:10px; border-radius:8px; shadow:sm;"><div style="text-align:center; font-weight:bold; background:var(--primary); color:white; padding:5px; border-radius:4px; margin-bottom:5px;">${mName}</div><div style="display:grid; grid-template-columns:repeat(7,1fr); gap:2px;">`;
            let days = new Date(year, m+1, 0).getDate();
            for(let d=1; d<=days; d++) {
                let ds = `${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let b = db.find(x => x.wohnung === apt && ds >= x.anreise && ds < x.abreise);
                let color = b ? (b.signature ? '#27ae60' : '#3498db') : '#f8f9fa';
                html += `<div style="background:${color}; color:${b?'white':'#000'}; padding:5px; text-align:center; font-size:10px; border-radius:2px;">${d}</div>`;
            }
            cont.innerHTML += html + `</div></div>`;
        }
    }

    const curY = new Date().getFullYear(); const yS = document.getElementById('year-select');
    for(let y=curY-1; y<=curY+2; y++) { let o=document.createElement('option'); o.value=y; o.innerText=y; if(y===curY) o.selected=true; yS.appendChild(o); }

    function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; ctx.lineWidth = 3; ctx.lineCap = "round"; }
    const getP = (e) => { const r = canvas.getBoundingClientRect(); const cX = e.touches ? e.touches[0].clientX : e.clientX; const cY = e.touches ? e.touches[0].clientY : e.clientY; return { x: cX - r.left, y: cY - r.top }; };
    canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { if(!drawing) return; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); });
    window.addEventListener('touchend', () => drawing = false);
</script>
</body>
</html>
