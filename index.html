<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dümmerblick Manager v15.3</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --secondary-light: #5dade2; --success: #27ae60; --orange: #e67e22; --danger: #e74c3c; --light: #f4f7f6; --empty: #f8f9fa; --cell-w: 46px; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding: 0; }
        .app-header { background: white; padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; gap: 10px; position: relative; height: 50px; box-sizing: border-box; }
        #sync-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--secondary); width: 0%; transition: width 0.4s; }
        .logo-svg-small { height: 30px; width: 30px; flex-shrink: 0; }
        .app-header h1 { font-size: 16px; margin: 0; color: var(--primary); font-weight: 800; text-transform: uppercase; white-space: nowrap; }
        #login-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary), #1a252f); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; color: white; text-align: center; }
        .logo-svg-large { width: 90px; height: 90px; margin-bottom: 20px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3)); }
        #pass-input { width: 240px; padding: 15px; border-radius: 12px; border: none; margin-bottom: 15px; text-align: center; font-size: 18px; color: #333; }
        .btn-login { background: var(--success); color: white; width: 240px; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .nav-top { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; background: #fff; }
        .nav-top button { padding: 14px 5px; border: none; border-radius: 10px; font-weight: bold; color: white; font-size: 13px; cursor: pointer; }
        .btn-blue { background: var(--secondary); } .btn-green { background: var(--success); } .btn-orange { background: var(--orange); } .btn-gray { background: #95a5a6; }
        .hidden { display: none !important; }
        .timeline-wrapper { display: flex; border: 1px solid #ddd; margin: 10px; border-radius: 14px; overflow: hidden; background: white; }
        .timeline-labels { width: 110px; min-width: 110px; background: #fdfdfd; border-right: 2px solid #ddd; }
        .label-cell { height: 60px; padding: 0 10px; display: flex; align-items: center; font-weight: bold; font-size: 11px; border-bottom: 1px solid #eee; }
        .timeline-scroll { flex: 1; overflow-x: auto; position: relative; }
        .grid-container { position: relative; width: fit-content; } 
        .grid-header { display: flex; height: 35px; background: #f4f6f7; border-bottom: 1px solid #ddd; }
        .day-label { width: var(--cell-w); min-width: var(--cell-w); text-align: center; line-height: 35px; font-size: 10px; border-right: 1px solid #ddd; box-sizing: border-box; }
        .grid-row { height: 60px; display: flex; border-bottom: 1px solid #eee; position: relative; width: calc(32 * var(--cell-w)); }
        .grid-cell { width: var(--cell-w); min-width: var(--cell-w); border-right: 1px solid #f0f0f0; box-sizing: border-box; }
        .booking-bar { position: absolute; height: 36px; top: 12px; color: white; border-radius: 8px; font-size: 10px; text-align: center; line-height: 36px; cursor: pointer; font-weight: bold; z-index: 5; border: 1.5px solid rgba(255,255,255,0.3); white-space: nowrap; padding: 0 5px; overflow: hidden; }
        .list-table { width: 100%; border-collapse: collapse; }
        .list-table tr { border-bottom: 1px solid #eee; }
        .list-table td { padding: 12px 15px; }
        .year-day-box { width: 100%; padding-bottom: 100%; position: relative; border: 0.5px solid #e0e0e0; }
        .day-num { position: absolute; z-index: 10; width: 100%; text-align: center; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 9px; font-weight: bold; pointer-events: none; }
        .split-top, .split-bottom, .full-day { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; }
        .split-top { clip-path: polygon(0 0, 100% 0, 0 100%); }
        .split-bottom { clip-path: polygon(100% 0, 100% 100%, 0 100%); border-top: 1.5px solid white; }
        .check-item { display: flex; align-items: center; padding: 10px 0; border-top: 1px solid #f9f9f9; }
        .check-item input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; accent-color: var(--success); }
        .check-item label { font-size: 15px; color: var(--primary); flex: 1; }
    </style>
</head>
<body>

<div id="login-overlay">
    <svg class="logo-svg-large" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="white"/><path d="M 10 65 Q 30 55, 50 65 T 90 65 L 90 90 L 10 90 Z" fill="#3498db"/><path d="M 40 90 L 45 60 L 55 60 L 60 90 Z" fill="#b1967a"/><circle cx="70" cy="35" r="12" fill="#e67e22"/></svg>
    <h2>DÜMMERBLICK<br>MANAGER</h2>
    <input type="password" id="pass-input" placeholder="Passwort" onkeypress="if(event.key==='Enter') checkLogin()">
    <button onclick="checkLogin()" class="btn-login">ANMELDEN</button>
</div>

<div class="container hidden" id="app-content">
    <header class="app-header">
        <svg class="logo-svg-small" viewBox="0 0 100 100"><path d="M 0 65 Q 25 50, 50 65 T 100 65 L 100 100 L 0 100 Z" fill="#3498db"/><path d="M 35 100 L 42 60 L 58 60 L 65 100 Z" fill="#b1967a"/><circle cx="75" cy="30" r="15" fill="#f39c12"/></svg>
        <h1>DÜMMERBLICK <span>MANAGER</span></h1>
        <div id="sync-bar"></div>
    </header>

    <div class="nav-top">
        <button class="btn-blue" onclick="showView('visual')">📊 30 TAGE</button>
        <button class="btn-orange" onclick="showView('year')">🗓️ JAHR</button>
        <button class="btn-green" onclick="showView('list')">📋 LISTE</button>
        <button class="btn-gray" onclick="showView('note')">📝 AUFGABEN</button>
    </div>

    <div id="view-visual" class="content-view"><div class="timeline-wrapper"><div class="timeline-labels"><div class="label-cell" style="height:35px; background:#f1f1f1;">Einheit</div><div class="label-cell">Dümmerblick 1</div><div class="label-cell">Dümmerblick 2</div></div><div class="timeline-scroll"><div class="grid-container" id="timeline-grid"></div></div></div></div>
    <div id="view-year" class="content-view hidden"><div style="padding:10px;"><select id="year-select" onchange="renderYear()"></select><select id="apt-filter" onchange="renderYear()"><option>Dümmerblick 1</option><option>Dümmerblick 2</option></select></div><div id="year-container" style="padding:10px; display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:15px;"></div></div>
    <div id="view-kalender" class="content-view hidden"><table class="list-table"><tbody id="belegungsDaten"></tbody></table></div>
    
    <div id="view-note" class="content-view hidden" style="padding:15px;">
        <div style="background:white; padding:15px; border-radius:14px; border:1px solid #ddd; margin-bottom:15px;">
            <label style="font-weight:bold; color:var(--primary);">NEUE LISTE / AUFGABE</label>
            <textarea id="n-text" rows="4" placeholder="Mehrere Zeilen = Checkliste" style="width:100%; padding:12px; border-radius:10px; border:1px solid #eee; margin-top:8px; box-sizing:border-box;"></textarea>
            <button onclick="saveNote()" class="btn-orange" style="width:100%; padding:15px; color:white; font-weight:bold; border-radius:10px; border:none; margin-top:10px;">HINZUFÜGEN</button>
        </div>
        <div id="notiz-liste"></div>
    </div>

    <div id="view-form" class="content-view hidden" style="padding:15px;"><div style="background:#fff; border-radius:16px; padding:20px; border:1px solid #ddd;"><input type="hidden" id="f-id"><input type="hidden" id="f-wohnung">
        <div class="form-group"><label>Name</label><input type="text" id="gastName" style="width:100%; padding:10px; border:1px solid #eee;"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;"><div><label>Anreise</label><input type="date" id="anreise" style="width:100%; padding:10px;"></div><div><label>Abreise</label><input type="date" id="abreise" style="width:100%; padding:10px;"></div></div>
        <div style="margin-top:10px;"><label>Anschrift</label><input type="text" id="anschrift" style="width:100%; padding:10px; border:1px solid #eee;"></div>
        <div style="margin-top:10px;"><label>E-Mail</label><input type="email" id="email" style="width:100%; padding:10px; border:1px solid #eee;"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;"><div><label>Telefon</label><input type="tel" id="telefon" style="width:100%; padding:10px;"></div><div><label>Ausweis</label><input type="text" id="ausweis" style="width:100%; padding:10px;"></div></div>
        <canvas id="signature-pad" style="border:1px solid #eee; width:100%; height:180px; border-radius:8px; background:#fafafa; touch-action:none; margin-top:15px;"></canvas>
        <button onclick="clearCanvas()" style="width:100%; padding:10px; margin-top:5px; background:#eee; border:none;">Löschen</button>
        <button onclick="saveData()" class="btn-green" style="width:100%; padding:20px; color:white; font-weight:bold; border-radius:10px; margin-top:20px;">💾 SPEICHERN</button>
        <button onclick="showView('visual')" style="width:100%; margin-top:10px; background:none; border:none; color:#999;">Abbrechen</button>
    </div></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwmTGnzW0mS0HKMOZTQyTy68-VOlhNdJGjwU05pCg8tJ3ZVDA0cVZml1e-rDCrCF5R9/exec"; 
    let db = JSON.parse(localStorage.getItem('dm_cache_db')) || []; 
    let notes = JSON.parse(localStorage.getItem('dm_cache_notes')) || [];
    let isCanvasEmpty = true; const canvas = document.getElementById('signature-pad'); const ctx = canvas ? canvas.getContext('2d') : null;

    function checkLogin() { 
        const p = document.getElementById('pass-input').value.toLowerCase().trim(); 
        if(p === 'duemmer123') { 
            document.getElementById('login-overlay').style.display = 'none'; 
            document.getElementById('app-content').classList.remove('hidden'); 
            renderAll(); load(); 
        } else { alert('Falsch'); } 
    }

    async function load() {
        const bar = document.getElementById('sync-bar'); bar.style.width = '30%';
        try {
            const r = await fetch(API + "?nocache=" + Date.now());
            const rawData = await r.json();
            db = Array.isArray(rawData) ? rawData : (rawData.buchungen || []);
            notes = rawData.notizen || [];
            localStorage.setItem('dm_cache_db', JSON.stringify(db));
            localStorage.setItem('dm_cache_notes', JSON.stringify(notes));
            bar.style.width = '100%';
            renderAll();
            setTimeout(() => bar.style.width = '0%', 800);
        } catch(e) { console.error(e); bar.style.backgroundColor = 'red'; }
    }

    function renderAll() { renderTimeline(); renderTable(); renderYear(); renderNotes(); }

    function renderNotes() {
        const cont = document.getElementById('notiz-liste'); if(!cont) return; cont.innerHTML = '';
        if(!notes || notes.length === 0) {
            cont.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">Keine Aufgaben vorhanden.</p>';
            return;
        }
        notes.slice().reverse().forEach(n => {
            const lines = n.text.split('\n').filter(l => l.trim() !== "");
            let h = `<div style="background:white; padding:12px; margin-bottom:15px; border-radius:12px; border:1px solid #eee; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                            <small style="color:#999;">${n.zeit}</small>
                            <button onclick="markDone(${n.row})" style="background:#fff1f0; color:var(--danger); border:none; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:bold;">LÖSCHEN</button>
                        </div>`;
            lines.forEach((line, idx) => {
                h += `<div class="check-item">
                        <input type="checkbox" id="c-${n.row}-${idx}">
                        <label for="c-${n.row}-${idx}">${line}</label>
                      </div>`;
            });
            h += `</div>`;
            cont.innerHTML += h;
        });
    }

    async function saveNote() {
        const t = document.getElementById('n-text').value; if(!t) return;
        document.getElementById('sync-bar').style.width = '50%';
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({type: "note", text: t}) });
        document.getElementById('n-text').value = ""; 
        setTimeout(load, 1000);
    }

    async function markDone(row) { 
        if(!confirm("Aufgabe wirklich löschen?")) return;
        document.getElementById('sync-bar').style.width = '50%';
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({type: "done", row: row}) }); 
        setTimeout(load, 1000);
    }

    function renderTimeline() {
        const grid = document.getElementById('timeline-grid'); if(!grid) return; grid.innerHTML = ''; 
        const today = new Date(); today.setHours(0,0,0,0);
        let header = '<div class="grid-header">'; for(let i=0; i<=31; i++) { let d = new Date(today); d.setDate(today.getDate()+i); header += `<div class="day-label">${d.getDate()}.${d.getMonth()+1}</div>`; }
        header += '</div>'; grid.innerHTML += header;
        const cellW = 46;
        ["Dümmerblick 1", "Dümmerblick 2"].forEach(apt => {
            let row = `<div class="grid-row">`; for(let i=0; i<=31; i++) row += `<div class="grid-cell
