<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dümmerblick Manager v7.3</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        
        /* LOGIN OVERLAY - RADIKAL VEREINFACHT FÜR MOBILE */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--primary); display: flex; justify-content: center; 
            align-items: center; z-index: 10000; color: white; flex-direction: column; 
        }
        .login-box { width: 90%; max-width: 320px; text-align: center; }
        
        #pass-input { 
            width: 100%; padding: 18px; border-radius: 12px; border: 2px solid transparent; 
            margin-bottom: 20px; text-align: center; font-size: 20px; box-sizing: border-box;
            background: white; color: #000; -webkit-appearance: none;
        }
        
        .btn-login { 
            background: var(--success); color: white; width: 100%; padding: 20px; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3); touch-action: none;
        }

        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .nav { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .nav button { flex: 1; min-width: 80px; padding: 15px 5px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 12px; cursor: pointer; }
        .btn-blue { background: var(--secondary); }
        .btn-green { background: var(--success); }
        .btn-orange { background: #e67e22; }
        .btn-gray { background: #95a5a6; }

        .hidden { display: none !important; }
        .field-container { margin-bottom: 15px; background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .field-label { background: #eee; padding: 6px 12px; font-size: 11px; font-weight: bold; color: #555; border-bottom: 1px solid #ddd; display: block; }
