<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dümmerblick Manager v9.0</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; color: white; flex-direction: column; }
        #pass-input { width: 280px; padding: 15px; border-radius: 10px; border: none; margin-bottom: 20px; text-align: center; font-size: 18px; color: #000; }
        .btn-login { background: var(--success); color: white; width: 280px; padding: 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .nav { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .nav button { flex: 1; min-width: 80px; padding: 15px 5px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 12px; cursor: pointer; }
        .btn-blue { background: var(--secondary); }
        .btn-green { background: var(--success); }
        .btn-orange { background: #e67e22; }
        .btn-gray { background: #95a5a6; }
        .hidden { display: none !important; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
        .s-done { background: #d4edda; color: #155724; }
        .s-open { background: #fff3cd; color: #856404; }
        .btn-storno { background: var(--danger); color: white; padding: 6px 10px; border: none; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .field-box { margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fff; }
        .field-label { background: #eee; padding: 6px 12px; font-size: 11px; font-weight: bold; color: #555; display: block; border-bottom: 1px solid #ddd; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: none; font-size: 16px; box-sizing: border-box; background: #fff; color: #000; min-height: 45px; }
        #signature-pad { background: #fafafa; width: 100%; height: 200px; touch-action: none; border-top: 1px solid #ddd; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 8px; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2 style="margin-bottom:20px;">Dümmerblick Manager</h2>
    <input type="text" id="pass-input" placeholder="Passwort" autocorrect="off" autocapitalize="none">
    <button onclick="handleLogin()" class="btn-login">ANMELDEN</button>
</div>

<div id="loading-overlay">Daten werden geladen...</div>

<div class="container hidden" id="app-content">
    <div class="nav">
        <button class="btn-blue" onclick="showView('visual')">📊 30 Tage</button>
        <button class="btn-orange" onclick="showView('year')">🗓️ Jahr</button>
        <button class="btn-green" onclick="showView('list')">📋 Liste</button>
        <button class="btn-gray" onclick="showView('form')">➕ NEU</button>
    </div>

    <div id="view-visual" class="content-view">
        <div id="timeline" style="overflow-x:auto;"></div>
    </div>

    <div id="view-year" class="content-view hidden">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <select id="year-select" onchange="renderYear()"></select>
            <select id="apt-filter" onchange="renderYear()"><option>Dümmerblick 1</option><option>Dümmerblick 2</option></select>
        </div>
        <div id="year-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:10px;"></div>
    </div>

    <div id="view-kalender" class="content-view hidden">
        <table>
            <thead><tr style="text-align:left; font-size:12px;"><th>Gast / Haus</th><th>Datum</th><th>Status</th><th>Aktion</th></tr></thead>
            <tbody id="belegungsDaten"></tbody>
        </table>
    </div>

    <div id="view-form" class="content-view hidden">
        <form id="checkinForm">
            <input type="hidden" id="f-id">
            <div class="field-box"><span class="field-label">Wohnung</span><select id="wohnung"><option>Dümmerblick 1</option><option>Dümmerblick 2</option></select></div>
            <div class="field-box"><span class="field-label">Gast Name</span><input type="text" id="gastName" required></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="field-box"><span class="field-label">Anreise</span><input type="date" id="anreise" required></div>
                <div class="field-box"><span class="field-label">Abreise</span><input type="date" id="abreise" required></div>
            </div>
            <div class="field-box"><span class="field-label">E-Mail Adresse</span><input type="email" id="email"></div>
            <div class="field-box"><span class="field-label">Telefonnummer</span><input type="tel" id="telefon"></div>
            <div class="field-box"><span class="field-label">Ausweisnummer</span><input type="text" id="ausweis"></div>
            <div class="field-box"><span class="field-label">Anschrift</span><input type="text" id="anschrift"></div>
            <div class="field-box"><span class="field-label">Unterschrift</span><canvas id="signature-pad"></canvas></div>
            <button type="submit" class="btn-green" style="width:100%; height:60px; font-size:18px;">💾 SPEICHERN & CHECK-IN</button>
        </form>
    </div>
</div>

<script>

    const API_URL = "https://script.google.com/macros/s/AKfycbwmTGnzW0mS0HKMOZTQyTy68-VOlhNdJGjwU05pCg8tJ3ZVDA0cVZml1e-rDCrCF5R9/exec";
    
    let db = [];
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function handleLogin() {
        const val = document.getElementById('pass-input').value.toLowerCase().trim();
        if(val === MY_PASSWORD) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').classList.remove('hidden');
            load();
        }
    }

        if(v === 'visual') { document.getElementById('view-visual').classList.remove('hidden'); renderTimeline(); }
        if(v === 'year') { document.getElementById('view-year').classList.remove('hidden'); renderYear(); }
