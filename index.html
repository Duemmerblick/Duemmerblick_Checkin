<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dümmerblick Manager v14.1</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --secondary-light: #5dade2; --success: #27ae60; --orange: #e67e22; --danger: #e74c3c; --light: #f4f7f6; --empty: #f8f9fa; --cell-w: 45px; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding: 0; }
        
        /* Fesches Login-Design */
        #login-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary), #1a252f); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; color: white; text-align: center; }
        
        /* Das programmierte SVG Logo (Groß für Login) */
        .logo-svg-large { width: 120px; height: 120px; margin-bottom: 25px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); }
        
        #pass-input { width: 260px; padding: 15px; border-radius: 12px; border: none; margin-bottom: 15px; text-align: center; font-size: 18px; color: #000; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }
        .btn-login { background: var(--success); color: white; width: 260px; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-login:active { transform: scale(0.96); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* Header mit Logo */
        .app-header { background: white; padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .logo-svg-small { height: 32px; width: 32px; }
        
        .app-header h1 { font-size: 17px; margin: 0; color: var(--primary); font-weight: 800; letter-spacing: -0.5px; text-transform: uppercase; }
        .app-header h1 span { font-weight: 300; color: #7f8c8d; }

        .container { width: 100%; max-width: 1200px; margin: auto; background: white; min-height: 100vh; padding-bottom: 80px; }
        .nav-top { display: flex; gap: 5px; padding: 10px; background: #fdfdfd; }
        .nav-top button { flex: 1; padding: 12px 2px; border: none; border-radius: 10px; font-weight: bold; color: white; font-size: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.08); transition: background 0.2s; }
        .nav-top button:active { opacity: 0.8; }
        
        .btn-blue { background: var(--secondary); } .btn-green { background: var(--success); } .btn-orange { background: var(--orange); } .btn-gray { background: #95a5a6; }
        .hidden { display: none !important; }
        
        /* Timeline Styles */
        .timeline-wrapper { display: flex; border: 1px solid #ddd; margin: 10px; border-radius: 14px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.06); }
        .timeline-labels { width: 130px; min-width: 130px; background: #fdfdfd; border-right: 2px solid #ddd; }
        .label-cell { height: 60px; padding: 0 10px; display: flex; align-items: center; font-weight: bold; font-size: 12px; border-bottom: 1px solid #eee; color: var(--primary); }
        .timeline-scroll { flex: 1; overflow-x: auto; position: relative; }
        .grid-container { position: relative; width: fit-content; } 
        .grid-header { display: flex; height: 35px; background: #f4f6f7; border-bottom: 1px solid #ddd; }
        .day-label { width: var(--cell-w); min-width: var(--cell-w); text-align: center; line-height: 35px; font-size: 10px; border-right: 1px solid #ddd; box-sizing: border-box; color: #7f8c8d; }
        .grid-row { height: 60px; display: flex; border-bottom: 1px solid #eee; position: relative; width: calc(32 * var(--cell-w)); }
        .grid-cell { width: var(--cell-w); min-width: var(--cell-w); border-right: 1px solid #f0f0f0; box-sizing: border-box; height: 100%; }
        .booking-bar { position: absolute; height: 34px; top: 13px; color: white; border-radius: 8px; font-size: 9px; text-align: center; line-height: 34px; cursor: pointer; font-weight: bold; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.15); z-index: 5; border: 1px solid rgba(255,255,255,0.2); }
        
        /* Kalender Design */
        .year-day-box { width: 100%; padding-bottom: 100%; position: relative; border: 0.5px solid #e0e0e0; background: var(--empty); overflow: hidden; }
        .day-num { position: absolute; z-index: 10; width: 100%; text-align: center; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 9px; font-weight: bold; pointer-events: none; color: #333; }
        .split-top { position: absolute; top: 0; left: 0; width: 100%; height: 100%; clip-path: polygon(0 0, 100% 0, 0 100%); }
        .split-bottom { position: absolute; top: 0; left: 0; width: 100%; height: 100%; clip-path: polygon(100% 0, 100% 100%, 0 100%); border-top: 1.5px solid white; }
        .full-day { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .note-card { background: #fff9f0; border-left: 4px solid var(--orange); padding: 12px; margin: 10px; border-radius: 8px; font-size: 14px; text-align: left; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .weekday-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 9px; font-weight: bold; color: #999; margin-bottom: 5px; }
        
        /* Formular Styling */
        .form-box { background:#fff; border:1px solid #ddd; border-radius:16px; padding:20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .form-group { margin-top: 12px; }
        .form-group label { display:block; font-size:10px; color:#7f8c8d; font-weight:bold; margin-bottom: 3px; text-transform: uppercase; }
        .form-group input { width:100%; padding:12px; border:1px solid #eee; border-radius:8px; box-sizing: border-box; font-size: 14px; background: #fbfcfc; }
        .form-group input:focus { border-color: var(--secondary); outline: none; background: white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <svg class="logo-svg-large" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
            </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="48" fill="white" stroke="#eee" stroke-width="2"/>
        <path d="M 10 65 Q 30 55, 50 65 T 90 65 L 90 90 L 10 90 Z" fill="url(#grad1)" />
        <path d="M 40 90 L 45 60 L 55 60 L 60 90 Z" fill="#b1967a" stroke="#8e7357" stroke-width="1"/>
        <path d="M 42 80 L 58 80 M 43 70 L 57 70" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="70" cy="35" r="12" fill="#e67e22" />
        <circle cx="70" cy="35" r="8" fill="#f39c12" />
    </svg>
    
    <h2 style="margin-top:0; margin-bottom:25px; font-weight: 300; letter-spacing: 1px; text-transform: uppercase;">DÜMMERBLICK<br><b>MANAGER</b></h2>
    <input type="text" id="pass-input" placeholder="Passwort">
    <button onclick="checkLogin()" class="btn-login">ANMELDEN</button>
</div>

<div id="loading-overlay"><b>Synchronisierung...</b></div>

<div class="container hidden" id="app-content">
    <header class="app-header">
        <svg class="logo-svg-small" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
                </linearGradient>
            </defs>
            <path d="M 0 65 Q 25 50, 50 65 T 100 65 L 100 100 L 0 100 Z" fill="url(#grad2)" />
            <path d="M 35 100 L 42 60 L 58 60 L 65 100 Z" fill="#b1967a" />
            <circle cx="75" cy="30" r="15" fill="#f39c12" />
        </svg>
        <h1>DÜMMERBLICK <span>MANAGER</span></h1>
    </header>

    <div class="nav-top">
        <button class="btn-blue" onclick="showView('visual')">📊 30 Tage</button>
        <button class="btn-orange" onclick="showView('year')">🗓️ Jahr</button>
        <button class="btn-green" onclick="showView('list')">📋 Liste</button>
        <button class="btn-gray" onclick="showView('note')">📝 NOTIZEN</button>
    </div>

    <div id="view-visual" class="content-view">
        <div class="timeline-wrapper">
            <div class="timeline-labels"><div class="label-cell" style="height:35px; background:#f1f1f1;">Einheit</div><div class="label-cell">Dümmerblick 1</div><div class="label-cell">Dümmerblick 2</div></div>
            <div class="timeline-scroll"><div class="grid-container" id="timeline-grid"></div></div>
        </div>
    </div>
    
    <div id="view-year" class="content-view hidden">
        <div style="padding:10px; display:flex; gap:10px;"><select id="year-select" onchange="renderYear()" style="padding:8px; border-radius:8px; border:1px solid #ddd;"></select><select id="apt-filter" onchange="renderYear()" style="padding:8px; border-radius:8px; border:1px solid #ddd;"><option>Dümmerblick 1</option><option>Dümmerblick 2</option></select></div>
        <div id="year-container" style="padding:10px; display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:15px;"></div>
    </div>

    <div id="view-kalender" class="content-view hidden"><table style="width:100%; border-collapse:collapse;"><tbody id="belegungsDaten"></tbody></table></div>
    
    <div id="view-note" class="content-view hidden" style="padding:15px;">
        <h3 style="color:var(--primary);">Neue Notiz</h3>
        <select id="n-wohnung" style="width:100%; padding:12px; border:1px solid #ddd; margin-bottom:10px; border-radius: 8px; background:white;"><option>Dümmerblick 1</option><option>Dümmerblick 2</option><option>Allgemein</option></select>
        <textarea id="n-text" rows="3" style="width:100%; padding:12px; border:1px solid #ddd; margin-bottom:10px; border-radius: 8px;" placeholder="Wichtige Info..."></textarea>
        <button onclick="saveNote()" class="btn-orange" style="width:100%; padding:15px; color:white; font-weight:bold; border:none; border-radius:10px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">SPEICHERN</button>
        <div id="notiz-liste" style="margin-top:20px;"></div>
    </div>

    <div id="view-form" class="content-view hidden" style="padding:15px;">
        <div class="form-box">
            <input type="hidden" id="f-id"><input type="hidden" id="f-wohnung">
            <div class="form-group"><label>Name des Gastes</label><input type="text" id="gastName"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="form-group"><label>Anreise</label><input type="date" id="anreise"></div>
                <div class="form-group"><label>Abreise</label><input type="date" id="abreise"></div>
            </div>
            <div class="form-group"><label>Anschrift</label><input type="text" id="anschrift"></div>
            <div class="form-group"><label>E-Mail</label><input type="email" id="email"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="form-group"><label>Telefon</label><input type="tel" id="telefon"></div>
                <div class="form-group"><label>Ausweis Nr.</label><input type="text" id="ausweis"></div>
            </div>
            <label style="display:block; font-size:10px; color:#7f8c8d; font-weight:bold; margin-top:20px; text-transform: uppercase;">Digitale Unterschrift</label>
            <canvas id="signature-pad" style="border:2px solid #eee; width:100%; height:180px; border-radius:12px; background:#fafafa; touch-action:none; margin-top:5px;"></canvas>
            <button onclick="clearCanvas()" style="background:#eee; color:#666; border:none; padding:10px; border-radius:8px; font-size:11px; margin-top:8px; cursor:pointer; width:100%; font-weight:bold;">❌ Unterschrift löschen</button>
            <button onclick="saveData()" class="btn-green" style="width:100%; padding:20px; color:white; border-radius:12px; font-weight:bold; border:none; margin-top:20px; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);">💾 DATEN SPEICHERN</button>
            <button onclick="showView('visual')" style="width:100%; margin-top:15px; background:none; border:none; color:#999; cursor:pointer;">Abbrechen</button>
        </div>
    </div>
</div>

<script>
    // DEIN API LINK BLEIBT GLEICH
    const API = "https://script.google.com/macros/s/AKfycbz2Zc_j8243m_luUJVRxfVjGkY1_Sp461xiHsRDXo6udla8NmigkJRXe0sXOEdse6Pz/exec"; 
    let db = []; let notes = []; let isCanvasEmpty = true;
    const canvas = document.getElementById('signature-pad'); const ctx = canvas.getContext('2d'); let drawing = false;

    function checkLogin() { const p = document.getElementById('pass-input').value.toLowerCase().trim(); if(p === 'duemmer123') { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('app-content').classList.remove('hidden'); load(); } else { alert('Falsch'); } }
    async function load() { document.getElementById('loading-overlay').style.display = 'flex'; try { const r = await fetch(API + "?nocache=" + Date.now()); const data = await r.json(); db = data.buchungen || []; notes = data.notizen || []; renderTimeline(); renderTable(); renderNotes(); renderYear(); } catch(e) { console.error(e); } document.getElementById('loading-overlay').style.display = 'none'; }
    function getBookingColor(booking, allBookingsOfApt) { if (booking.signature && booking.signature.length > 500) return 'var(--success)'; const index = allBookingsOfApt.findIndex(x => x.id === booking.id); return (index % 2 === 0) ? 'var(--secondary)' : 'var(--secondary-light)'; }
    
    function renderYear() {
        const year = parseInt(document.getElementById('year-select').value) || new Date().getFullYear();
        const apt = document.getElementById('apt-filter').value; const cont = document.getElementById('year-container'); cont.innerHTML = '';
        const aptBookings = db.filter(b => b.wohnung === apt).sort((a,b) => new Date(a.anreise) - new Date(b.anreise));
        const weekdays = ["M", "D", "M", "D", "F", "S", "S"];
        for(let m=0; m<12; m++) {
            let mName = new Date(year, m).toLocaleString('de-DE', {month:'long'});
            let h = `<div style="background:#fff; padding:10px; border-radius:8px; border:1px solid #ddd;">
                        <div style="text-align:center; font-weight:bold; background:#2c3e50; color:white; padding:5px; border-radius:4px; margin-bottom:5px;">${mName}</div>
                        <div class="weekday-header">${weekdays.map(d => `<div>${d}</div>`).join('')}</div>
                        <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:2px;">`;
            let firstDay = new Date(year, m, 1).getDay();
            let shift = (firstDay === 0) ? 6 : firstDay - 1;
            for(let s=0; s<shift; s++) { h += `<div class="year-day-box" style="background:transparent; border:none;"></div>`; }
            let dMax = new Date(year, m+1, 0).getDate();
            for(let d=1; d<=dMax; d++) {
                let ds = `${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let checkout = db.find(x => x.wohnung === apt && ds === x.abreise);
                let checkin = db.find(x => x.wohnung === apt && ds === x.anreise);
                let stay = db.find(x => x.wohnung === apt && ds > x.anreise && ds < x.abreise);
                let colorTop = checkout ? getBookingColor(checkout, aptBookings) : 'transparent';
                let colorBot = checkin ? getBookingColor(checkin, aptBookings) : 'transparent';
                let colorFull = stay ? getBookingColor(stay, aptBookings) : 'transparent';
                h += `<div class="year-day-box"><div class="day-num">${d}</div>${stay ? `<div class="full-day" style="background:${colorFull}"></div>` : ''}${checkout ? `<div class="split-top" style="background:${colorTop}"></div>` : ''}${checkin ? `<div class="split-bottom" style="background:${colorBot}"></div>` : ''}</div>`;
            }
            cont.innerHTML += h + `</div></div>`;
        }
    }

    function renderTimeline() {
        const grid = document.getElementById('timeline-grid'); grid.innerHTML = ''; 
        const today = new Date(); today.setHours(0,0,0,0);
        const cellW = 45;
        let header = '<div class="grid-header">'; 
        for(let i=0; i<=31; i++) { 
            let d = new Date(today); d.setDate(today.getDate()+i); 
            header += `<div class="day-label">${d.getDate()}.${d.getMonth()+1}</div>`; 
        } 
        header += '</div>'; grid.innerHTML += header;
        ["Dümmerblick 1", "Dümmerblick 2"].forEach(apt => {
            let row = `<div class="grid-row">`; 
            for(let i=0; i<=31; i++) { row += `<div class="grid-cell"></div>`; }
            let aptBookings = db.filter(b => b.wohnung === apt).sort((a,b) => new Date(a.anreise) - new Date(b.anreise));
            aptBookings.forEach((b) => {
                const sDate = new Date(b.anreise); sDate.setHours(0,0,0,0);
                const eDate = new Date(b.abreise); eDate.setHours(0,0,0,0);
                const diffStart = Math.round((sDate.getTime() - today.getTime()) / 86400000);
                const duration = Math.round((eDate.getTime() - sDate.getTime()) / 86400000);
                if(diffStart + duration >= 0 && diffStart <= 31) { 
                    let left = (diffStart * cellW) + (cellW / 2); 
                    let width = (duration * cellW); 
                    row += `<div onclick="editEntry('${b.id}')" class="booking-bar" style="left:${left}px; width:${width}px; background:${getBookingColor
